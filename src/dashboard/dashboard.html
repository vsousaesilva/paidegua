<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pAIdegua &mdash; Analisar tarefas</title>
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>
    <header class="header">
      <div class="header__brand">
        <span class="header__logo" aria-hidden="true">
          <svg width="28" height="28" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <rect x="6.6" y="4.08" width="2.88" height="17.04" rx="1.2" fill="currentColor"/>
            <circle cx="14.28" cy="10.32" r="4.62" fill="none" stroke="currentColor" stroke-width="2.52"/>
            <circle cx="14.28" cy="10.32" r="2.04" fill="#FFCD07"/>
          </svg>
        </span>
        <div>
          <h1>Analisar tarefas</h1>
          <p class="header__subtitle">pAIdegua &mdash; Triagem Inteligente / Secretaria</p>
        </div>
      </div>
      <div class="header__hydration" id="hydration" hidden>
        <div class="header__hydration-label" id="hydration-label">
          Carregando links dos autos: 0 de 0
        </div>
        <div class="header__hydration-track">
          <div class="header__hydration-fill" id="hydration-fill"></div>
        </div>
      </div>
      <div class="header__meta" id="meta">Carregando...</div>
    </header>

    <main class="main" id="main">
      <p class="loading">Carregando dados do painel...</p>
    </main>

    <footer class="footer">
      <small>pAIdegua &middot; Inovajus / JFCE</small>
    </footer>
  </body>
  <script src="dashboard.js"></script>
</html>
