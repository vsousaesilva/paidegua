name: Deploy Kanban (Pages + Worker + Docs)

# Deploy automático em cada push em main que toque arquivos relevantes:
#  - deploy-pages: HTML/CSS/JS/seed do front (Cloudflare Pages)
#  - deploy-worker: worker.js / wrangler.toml (Cloudflare Worker)
#  - sync-docs: reimporta docs/*.md → KV docs:state (espelho dos manuais
#    do projeto dentro da seção 📚 Documentos do Kanban)
#
# Secrets necessários no repo (Settings → Secrets and variables → Actions):
#  - CLOUDFLARE_API_TOKEN: token paidegua-kanban-deploy
#    (Pages:Edit, Workers Scripts:Edit, Workers KV Storage:Edit,
#     Workers Routes:Edit, Account Settings:Read, Zone:Read, DNS:Edit)
#  - CLOUDFLARE_ACCOUNT_ID: f13a21f421661dcfb1651880a2be578e

on:
  push:
    branches: [main]
    paths:
      - 'docs/**/*.md'
      - 'docs/kanban-massificacao/**'
      - '.github/workflows/deploy-kanban.yml'
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      pages: ${{ steps.filter.outputs.pages }}
      worker: ${{ steps.filter.outputs.worker }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            pages:
              - 'docs/kanban-massificacao/**'
              - '!docs/kanban-massificacao/worker/**'
              - '!docs/kanban-massificacao/scripts/**'
              - '.github/workflows/deploy-kanban.yml'
            worker:
              - 'docs/kanban-massificacao/worker/**'
              - '.github/workflows/deploy-kanban.yml'
            docs:
              - 'docs/**/*.md'
              - '!docs/kanban-massificacao/**'
              - 'docs/kanban-massificacao/scripts/import-docs.mjs'
              - '.github/workflows/deploy-kanban.yml'

  deploy-pages:
    needs: detect-changes
    if: needs.detect-changes.outputs.pages == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy Pages (paidegua-kanban)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy "docs/kanban-massificacao" --project-name=paidegua-kanban --branch=main --commit-dirty=true

  deploy-worker:
    needs: detect-changes
    if: needs.detect-changes.outputs.worker == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy Worker (paidegua-kanban-api)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: docs/kanban-massificacao/worker
          command: deploy

  sync-docs:
    needs: detect-changes
    if: needs.detect-changes.outputs.docs == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Gerar import-docs-state.json
        working-directory: docs/kanban-massificacao
        run: |
          node scripts/import-docs.mjs
          echo "Tamanho do JSON gerado:"
          ls -la scripts/import-docs-state.json
          echo "Itens no JSON:"
          node -e "const d=require('./scripts/import-docs-state.json'); console.log(d.items.length, 'docs')"
      - name: Subir para KV docs:state
        working-directory: docs/kanban-massificacao
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@latest kv key put \
            "docs:state" \
            --path=scripts/import-docs-state.json \
            --namespace-id=9002dc0915f84842bf98ea894257d0a9 \
            --remote
